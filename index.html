<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fractal Explorer</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:black;font-family:Arial,sans-serif;}
    body{color:white;}
    #appShell{width:100vw;height:100vh;display:flex;position:relative;background:black;}
    #leftPanel{
      width:240px;min-width:240px;max-width:240px;height:100vh;
      overflow-y:auto;overflow-x:hidden;box-sizing:border-box;padding:10px;
      display:flex;flex-direction:column;gap:8px;
      background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);
      border-right:1px solid rgba(255,255,255,0.12);z-index:20;
    }
    #rightPanel{
      width:340px;min-width:340px;max-width:340px;height:100vh;
      overflow-y:auto;overflow-x:hidden;box-sizing:border-box;padding:10px;
      background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);
      border-left:1px solid rgba(255,255,255,0.12);z-index:20;
    }
    #canvasContainer{flex:1;position:relative;min-width:0;min-height:0;overflow:hidden;background:black;}
    #previewFrame{position:absolute;background:black;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,0.08);}
    canvas{display:block;width:100%;height:100%;}
    .panelBox{background:rgba(255,255,255,0.92);color:#000;padding:10px;border:1px solid #000;box-sizing:border-box;}
    .panelBox label{display:block;margin-bottom:6px;font-size:13px;font-weight:bold;}
    .rowGap{display:flex;flex-direction:column;gap:6px;}
    #leftPanel button,#leftPanel select,#leftPanel input{width:100%;box-sizing:border-box;padding:10px 12px;font-size:14px;border:1px solid #000;}
    #leftPanel button{background:#fff;color:#000;cursor:pointer;text-align:center;}
    #leftPanel button:disabled{opacity:0.7;cursor:wait;}
    #leftPanel button.btnDark{background:#222;color:#fff;border-color:#555;}
    #leftPanel button.btnDark.active{background:#c00;color:#fff;border-color:#c00;}
    #leftPanel button.btnGreen{background:#111;color:#aaa;border-color:#444;}
    #leftPanel button.btnGreen.active{background:#080;color:#fff;border-color:#080;}
    #sessionStatus{font-size:11px;color:#555;text-align:center;min-height:14px;}
    #startOverlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);backdrop-filter:blur(4px);}
    #startCard{width:min(92vw,520px);padding:34px 28px;border:1px solid rgba(255,255,255,0.24);background:rgba(0,0,0,0.58);color:white;text-align:center;box-sizing:border-box;}
    #startCard h1{margin:0 0 10px 0;font-size:38px;line-height:1.1;letter-spacing:0.02em;font-weight:700;}
    #startCard p{margin:0 0 22px 0;font-size:15px;line-height:1.5;color:rgba(255,255,255,0.78);}
    .startButtons{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
    .startButtons button{width:100%;padding:14px 16px;font-size:16px;cursor:pointer;border:1px solid white;background:white;color:black;box-sizing:border-box;}
    .startButtons button.secondary{background:transparent;color:white;}
    #startStatus{margin-top:14px;min-height:20px;font-size:13px;color:rgba(255,255,255,0.72);}
    .dg.main{width:100%!important;}
    .dg{color:#fff!important;}
    .dg .cr.number input[type=text]{color:#000!important;}
    #rightPanel .dg.main{margin:0!important;}
    @media only screen and (max-width:1100px){#leftPanel{width:210px;min-width:210px;max-width:210px;}#rightPanel{width:300px;min-width:300px;max-width:300px;}}
    @media only screen and (max-width:900px){
      #appShell{flex-direction:column;}
      #leftPanel,#rightPanel{width:100%;min-width:100%;max-width:100%;height:auto;max-height:28vh;border:none;}
      #leftPanel{border-bottom:1px solid rgba(255,255,255,0.12);}
      #rightPanel{border-top:1px solid rgba(255,255,255,0.12);}
      #canvasContainer{height:44vh;}
      #startCard h1{font-size:32px;}
    }
  </style>
</head>
<body>

<div id="startOverlay">
  <div id="startCard">
    <h1>Fractal Explorer</h1>
    <p>Choose how you want to start. You can use live microphone input for audio reactivity, or continue without it.</p>
    <div class="startButtons">
      <button id="enterWithMicBtn">Start with Microphone</button>
      <button id="enterWithoutMicBtn" class="secondary">Start without Microphone</button>
    </div>
    <div id="startStatus"></div>
  </div>
</div>

<div id="appShell">
  <div id="leftPanel">

    <!-- Presets -->
    <div class="panelBox rowGap">
      <label for="presetNameInput">Preset Name</label>
      <input id="presetNameInput" type="text" placeholder="My preset" />
      <button id="savePresetBtn">Save Preset</button>
      <button id="overwritePresetBtn">Overwrite Selected</button>
      <label for="presetSelect">Load Preset</label>
      <select id="presetSelect"><option value="">No saved presets</option></select>
      <button id="loadPresetBtn">Load Selected</button>
      <button id="deletePresetBtn">Delete Selected</button>
      <button id="exportPresetBtn">Export Preset JSON</button>
      <button id="importPresetBtn">Import Preset JSON</button>
      <input id="importPresetInput" type="file" accept=".json,application/json" style="display:none;" />
    </div>

    <!-- Session recorder -->
    <div class="panelBox rowGap">
      <label>Session Recorder</label>
      <button id="recordSessionBtn" class="btnGreen">⏺ Start Recording</button>
      <button id="stopSessionBtn" class="btnDark" disabled>⏹ Stop Recording</button>
      <button id="exportSessionBtn" disabled>Export Session JSON</button>
      <button id="importSessionBtn">Import &amp; Replay Session</button>
      <input id="importSessionInput" type="file" accept=".json,application/json" style="display:none;" />
      <div id="sessionStatus">Not recording</div>
    </div>

    <!-- Export -->
    <div class="panelBox rowGap">
      <label for="exportFormatSelect">Export Format</label>
      <select id="exportFormatSelect">
        <option value="1280x720">Landscape HD, 1280 x 720</option>
        <option value="1920x1080">Landscape Full HD, 1920 x 1080</option>
        <option value="3840x2160" selected>Landscape 4K, 3840 x 2160</option>
        <option value="2160x3840">Vertical 4K, 2160 x 3840</option>
        <option value="1080x1920">Vertical HD, 1080 x 1920</option>
        <option value="2160x2160">Square 4K, 2160 x 2160</option>
      </select>
      <label for="formatSelect">Video Format</label>
      <select id="formatSelect">
        <option value="webm-vp9">WebM VP9</option>
        <option value="webm">WebM Basic</option>
        <option value="mp4">MP4, if supported</option>
      </select>
      <label for="qualitySelect">Video Quality</label>
      <select id="qualitySelect">
        <option value="low">Low, 5 Mbps</option>
        <option value="medium">Medium, 12 Mbps</option>
        <option value="high" selected>High, 25 Mbps</option>
        <option value="ultra">Ultra, 50 Mbps</option>
      </select>
      <label for="durationSelect">Clip Duration</label>
      <select id="durationSelect">
        <option value="5">5 sec</option>
        <option value="10" selected>10 sec</option>
        <option value="15">15 sec</option>
        <option value="30">30 sec</option>
      </select>
    </div>

    <button id="freezeBtn" class="btnDark">⏸ Freeze Animation</button>
    <button id="randomizeBtn">🎲 Randomize Preset</button>
    <button id="exportStillBtn">Export Still</button>
    <button id="recordBtn">Record Clip</button>
    <button id="fsToggleBtn">Enter Full Screen</button>

  </div>

  <div id="canvasContainer">
    <div id="previewFrame"></div>
  </div>

  <div id="rightPanel">
    <div id="gui"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>

<!-- ================================================================
  FRAGMENT SHADER — unchanged from previous version
  symmetryMode: 0=none 1=H 2=V 3=dual 4=QuadDense 5=SquareTile
                6=diagonal 7=radial 8=tiling 9=polar
================================================================ -->
<script id="fragmentShader" type="x-shader/x-fragment">
#ifdef GL_OES_standard_derivatives
#extension GL_OES_standard_derivatives : enable
#endif
precision mediump float;

uniform vec2  iResolution;
uniform float iTime;
uniform float uPower;
uniform float uBailout;
uniform int   uIterations;
uniform float uSurfaceEpsilon;
uniform int   uMaxSteps;
uniform float uMaxDistance;
uniform vec3  uColor;
uniform float uMusic;
uniform int   uShape;
uniform vec3  uCamPos;
uniform vec3  uCamRight;
uniform vec3  uCamUp;
uniform vec3  uCamForward;
uniform vec3  uFractalRotation;
uniform float uMirror;
uniform float uMirrorQuad;
uniform float uLightIntensity;
uniform float uLightAzimuth;
uniform float uLightElevation;
uniform vec3  uLightColor;
uniform float uShadowStrength;
uniform vec3  uShadowTint;
uniform float uContrast;
uniform float uMidtoneLift;
uniform float uSpecularStrength;
uniform float uSpecularSize;
uniform float uColorSaturation;
uniform float uColorVibrance;
uniform float uPaletteContrast;
uniform float uColorIntensity;
uniform float uPreserveHighlightColor;
uniform float uRidgeAccent;
uniform float uCavityStrength;
uniform float uGlowOn;
uniform vec3  uGlowColorA; uniform float uGlowAlphaA;
uniform vec3  uGlowColorB; uniform float uGlowAlphaB;
uniform float uGlowStrength; uniform float uGlowWidth; uniform float uGlowEmission;
uniform float uGlowScroll; uniform float uGlowScrollSpeed; uniform float uGlowReverse;
uniform float uLineOn;
uniform vec3  uLineColorA; uniform float uLineAlphaA;
uniform vec3  uLineColorB; uniform float uLineAlphaB;
uniform float uLineStrength; uniform float uLineWidth; uniform float uLineSoftness;
uniform float uLineScroll; uniform float uLineScrollSpeed; uniform float uLineReverse;
uniform float uInnerGlowStrength; uniform float uInnerGlowWidth; uniform vec3 uInnerGlowColor;
uniform float uPaletteMode;
uniform float uRingScale; uniform float uRingStrength;
uniform vec3  uWarmColor; uniform vec3 uCoolColor;
uniform vec3  uPsyColorA; uniform vec3 uPsyColorB; uniform vec3 uPsyColorC; uniform vec3 uPsyColorD;
uniform float uPsyMix; uniform float uPsyScale; uniform float uPsyFlow; uniform float uPsySpinStrength;
uniform float uPaletteCycle; uniform float uPaletteCycleSpeed; uniform float uPsyStyle;
uniform float uPatternMode; uniform float uPatternStrength; uniform float uPatternScale;
uniform float uPatternSpeed; uniform float uPatternBlend;
uniform float uColorBands; uniform float uBandStrength;
uniform float uPsyShaderMode; uniform float uPsyEmission; uniform float uPsyDepthShade;
uniform float uPsyContrast; uniform float uPsySaturation;
uniform float uPsyInternalGlow; uniform float uPsyGlowThreshold; uniform float uPsyGlowOn;
uniform float uSymmetryMode; uniform float uRadialSegments; uniform float uSymmetryStack;
uniform float uTwistOn; uniform float uTwistAmount;
uniform float uFoldOn;  uniform float uFoldIterations;
uniform float uTileOn;  uniform float uTileAmount;
uniform float uPolarOn; uniform float uOffsetOn; uniform float uOffsetAmount;
// Camera roll — screen-space rotation angle applied before symmetry
uniform float uScreenRotateAngle;

vec2 rot2(vec2 v,float a){float c=cos(a),s=sin(a);return vec2(v.x*c-v.y*s,v.x*s+v.y*c);}

vec2 applyBaseMode(vec2 uv){
  float m=uSymmetryMode;
  if(m<0.5)return uv;
  if(m<1.5){uv.x=abs(uv.x);return uv;}
  if(m<2.5){uv.y=abs(uv.y);return uv;}
  if(m<3.5)return abs(uv);
  if(m<4.5){vec2 t=fract(uv*0.5+0.5);t=abs(t*2.0-1.0);t=abs(t*2.0-1.0);return t*2.0-1.0;}
  if(m<5.5){vec2 t=(uv+1.0)*0.5;t=mod(t*2.0,1.0);t=abs(t-0.5)*2.0;return t*2.0-1.0;}
  if(m<6.5){if(uv.y>uv.x){float tmp=uv.x;uv.x=uv.y;uv.y=tmp;}return uv;}
  if(m<7.5){float n=max(2.0,uRadialSegments),sl=3.14159265/n,a=atan(uv.y,uv.x),r=length(uv);a=mod(a,2.0*sl);if(a>sl)a=2.0*sl-a;return vec2(cos(a),sin(a))*r;}
  if(m<8.5){float s=max(0.1,uTileAmount);return(fract(uv*s+0.5)-0.5)/s;}
  if(m<9.5){float r=length(uv),a=atan(uv.y,uv.x)/3.14159265;return vec2(a,r-0.5);}
  return uv;
}
vec2 applyTwist(vec2 uv){return rot2(uv,length(uv)*uTwistAmount);}
vec2 applyFold(vec2 uv){int it=int(clamp(uFoldIterations,1.0,5.0));for(int i=0;i<5;i++){if(i>=it)break;uv=abs(uv)-0.5;}return uv;}
vec2 applyTile(vec2 uv){float s=max(0.1,uTileAmount);return(fract(uv*s+0.5)-0.5)/s;}
vec2 applyPolar(vec2 uv){float r=length(uv)+0.0001,a=atan(uv.y,uv.x),nr=fract(r*1.5+0.5)/1.5;return vec2(cos(a+0.4/r),sin(a+0.4/r))*nr;}
vec2 applyOffset(vec2 uv){float sec=floor(atan(uv.y,uv.x)/(3.14159265/4.0)),off=(fract(sec*0.73+1.37)-0.5)*uOffsetAmount;return rot2(uv,off);}
vec2 applySymmetry(vec2 uv){uv=applyBaseMode(uv);if(uSymmetryStack>0.5){if(uTwistOn>0.5)uv=applyTwist(uv);if(uFoldOn>0.5)uv=applyFold(uv);if(uTileOn>0.5)uv=applyTile(uv);if(uPolarOn>0.5)uv=applyPolar(uv);if(uOffsetOn>0.5)uv=applyOffset(uv);}return uv;}

mat3 rotationMatrix(vec3 a){float cx=cos(a.x),sx=sin(a.x),cy=cos(a.y),sy=sin(a.y),cz=cos(a.z),sz=sin(a.z);return mat3(cz,-sz,0,sz,cz,0,0,0,1)*mat3(cy,0,sy,0,1,0,-sy,0,cy)*mat3(1,0,0,0,cx,-sx,0,sx,cx);}

float mandelbulb(vec3 pos){
  pos=rotationMatrix(uFractalRotation)*pos;
  vec3 z=pos;float dr=1.0,r=0.0;
  for(int i=0;i<100;i++){
    if(i>=uIterations)break;r=length(z);if(r>uBailout)break;
    if(uShape==0){float sr=max(r,1e-5),th=acos(z.z/sr),ph=atan(z.y,z.x);dr=pow(sr,uPower-1.0)*uPower*dr+1.0;float zr=pow(sr,uPower);th*=uPower;ph*=uPower;z=zr*vec3(sin(th)*cos(ph),sin(th)*sin(ph),cos(th));}
    else if(uShape==1){float rc=max(max(abs(z.x),abs(z.y)),abs(z.z)),s=max(rc,1e-5);dr=pow(s,uPower-1.0)*uPower*dr+1.0;z=sign(z)*pow(s,uPower);}
    else if(uShape==2){float rp=max(abs(z.x)+abs(z.y),abs(z.z)),s=max(rp,1e-5);dr=pow(s,uPower-1.0)*uPower*dr+1.0;z=sign(z)*pow(s,uPower);}
    else{float rh=max(length(z.xy)/cos(3.14159/6.0),abs(z.z)),s=max(rh,1e-5);dr=pow(s,uPower-1.0)*uPower*dr+1.0;z=sign(z)*pow(s,uPower);}
    z+=pos;
  }
  return 0.5*log(max(r,1e-5))*r/max(dr,1e-5);
}

float calcShadow(vec3 ro,vec3 rd){float t=0.01,s=1.0;for(int i=0;i<50;i++){float d=mandelbulb(ro+rd*t);if(d<uSurfaceEpsilon){s=0.0;break;}t+=d;if(t>uMaxDistance)break;}return s;}
float rayMarch(vec3 ro,vec3 rd){float t=0.0;for(int i=0;i<300;i++){if(i>=uMaxSteps)break;float d=mandelbulb(ro+rd*t);if(d<uSurfaceEpsilon)return t;t+=d;if(t>uMaxDistance)break;}return t;}
vec3 calcNormal(vec3 pos){float e=0.001;return normalize(vec3(mandelbulb(pos+vec3(e,0,0))-mandelbulb(pos-vec3(e,0,0)),mandelbulb(pos+vec3(0,e,0))-mandelbulb(pos-vec3(0,e,0)),mandelbulb(pos+vec3(0,0,e))-mandelbulb(pos-vec3(0,0,e))));}
float luma(vec3 c){return dot(c,vec3(0.299,0.587,0.114));}
vec3 satVib(vec3 c,float sat,float vib){float l=luma(c);c=mix(vec3(l),c,sat);float mx=max(max(c.r,c.g),c.b),mn=min(min(c.r,c.g),c.b);c=mix(vec3(luma(c)),c,1.0+(1.0-(mx-mn))*vib);return c;}
float qband(float v){if(uColorBands<1.5)return v;float b=max(1.0,uColorBands),q=floor(v*b)/b;return mix(v,q,clamp(uBandStrength,0.0,1.0));}
vec3 psyPal(float t){t=fract(t);if(t<0.333333)return mix(uPsyColorA,uPsyColorB,t/0.333333);else if(t<0.666666)return mix(uPsyColorB,uPsyColorC,(t-0.333333)/0.333333);else return mix(uPsyColorC,uPsyColorD,(t-0.666666)/0.333334);}

float patternValue(vec3 pos,float ph){
  float x=pos.x,y=pos.y,z=pos.z,r=length(pos.xy),r3=length(pos),a=atan(y,x),s=uPatternScale,t=ph*uPatternSpeed;
  if(uPatternMode<0.5)return 0.0;
  else if(uPatternMode<1.5)return 0.5+0.5*sin(y*s+t);
  else if(uPatternMode<2.5)return 0.5+0.5*sin(x*s+t);
  else if(uPatternMode<3.5)return 0.5+0.5*sin((x+y)*s+t);
  else if(uPatternMode<4.5)return 0.5+0.5*sin(y*s+sin(x*s*0.75+t)*2.0+t);
  else if(uPatternMode<5.5)return 0.5+0.5*sin(x*s+sin(y*s*0.75+t)*2.0+t);
  else if(uPatternMode<6.5)return step(0.0,sin(x*s+t)*sin(y*s+t));
  else if(uPatternMode<7.5){float wx=x+sin(y*s*0.65+t)*0.6,wy=y+sin(x*s*0.65-t)*0.6;return step(0.0,sin(wx*s)*sin(wy*s));}
  else if(uPatternMode<8.5){float qx=x*0.866025+y*0.5,h1=abs(fract(qx*s)-0.5),h2=abs(fract(y*s)-0.5),h3=abs(fract((qx-y*0.5)*s)-0.5);return 1.0-smoothstep(0.18,0.24,min(min(h1,h2),h3));}
  else if(uPatternMode<9.5)return 0.5+0.5*sin(r3*s+t);
  else if(uPatternMode<10.5)return 0.5+0.5*sin((r3+z*0.4)*s+t);
  else if(uPatternMode<11.5)return 0.5+0.5*(sin(x*s+t)*sin(y*s*1.2-t*0.8));
  else if(uPatternMode<12.5)return 0.5+0.5*sin(r*s-t);
  else if(uPatternMode<13.5)return 0.5+0.5*sin(a*s+t);
  else if(uPatternMode<14.5)return 0.5+0.5*sin(r*s+a*3.0-t);
  else if(uPatternMode<15.5)return 0.5+0.5*sin(r*s+a*6.0-t);
  else if(uPatternMode<16.5){
    vec2 p=pos.xy*s,ip=floor(p),fp=fract(p);float md=10.0;
    for(int yy=-1;yy<=1;yy++)for(int xx=-1;xx<=1;xx++){vec2 g=vec2(float(xx),float(yy)),o=0.5+0.35*sin(vec2(1.7,2.9)*dot(ip+g,vec2(7.1,5.3))+t),r2=g+o-fp;md=min(md,dot(r2,r2));}
    return 1.0-smoothstep(0.0,0.4,sqrt(md));
  }
  return 0.5+0.5*sin((x+y+z)*s+sin((x-y)*s*0.7+t)*2.0+t);
}

void main(){
  vec2 uv=(gl_FragCoord.xy/iResolution.xy)*2.0-1.0;
  uv.x*=iResolution.x/iResolution.y;
  uv=rot2(uv,uScreenRotateAngle);
  uv=applySymmetry(uv);

  vec3 ro=uCamPos;
  vec3 rd=normalize(uv.x*uCamRight+uv.y*uCamUp+1.5*uCamForward);
  float tVal=rayMarch(ro,rd);
  vec3 col=vec3(0.0);

  if(tVal<uMaxDistance){
    vec3 pos=ro+rd*tVal,normal=calcNormal(pos);
    vec3 ld=normalize(vec3(cos(uLightAzimuth)*cos(uLightElevation),sin(uLightAzimuth)*cos(uLightElevation),sin(uLightElevation)));
    float diff=max(dot(normal,ld),0.0),shad=calcShadow(pos+normal*uSurfaceEpsilon*2.0,ld);
    vec3 vd=normalize(ro-pos),hd=normalize(ld+vd);
    float se=mix(96.0,6.0,clamp((uSpecularSize-0.1)/2.9,0.0,1.0));
    float spec=(uSpecularStrength>0.001)?pow(max(dot(normal,hd),0.0),se):0.0;
    vec3 specular=uLightColor*spec*uSpecularStrength*shad;
    float lv=0.14+0.86*diff*shad;
    lv=mix(1.0,lv,uShadowStrength);lv=pow(clamp(lv,0.0,1.0),max(0.05,uContrast));
    lv=clamp(lv+lv*(1.0-lv)*uMidtoneLift,0.0,1.0);
    float rim=clamp(1.0-abs(dot(normal,vd)),0.0,1.0);
    float ph=uPaletteCycle>0.5?iTime*uPaletteCycleSpeed:0.0;
    float pat=qband(patternValue(pos,ph));
    vec3 baseCol;

    if(uPaletteMode<0.5){
      baseCol=mix(uShadowTint,uColor,lv);
    }else if(uPaletteMode<1.5){
      float rings=qband(smoothstep(0.18,0.82,0.5+0.5*sin(length(pos.xy)*uRingScale+pos.z*1.5+ph)));
      vec3 warm=mix(uShadowTint,uWarmColor,lv),cool=uCoolColor*pow(rim,2.0),rmix=mix(warm,cool,rings*uRingStrength);
      float pd=pat*uPatternBlend*uPatternStrength;rmix=mix(rmix,mix(uWarmColor,uCoolColor,pat),pd*0.9);
      baseCol=mix(uShadowTint,rmix,clamp(lv+0.18,0.0,1.0));
    }else{
      float rf=length(pos.xy)*uPsyScale,af=atan(pos.y,pos.x)*uPsySpinStrength,df=pos.z*1.3,ff=ph+iTime*uPsyFlow,ridge=rim*5.0;
      float b1,b2,b3;
      if(uPsyStyle<0.5){b1=0.5+0.5*sin(rf*0.8+af*0.75+ff*0.7);b2=0.5+0.5*sin((pos.x-pos.y)*uPsyScale*0.45+df*0.7+ff*0.5);b3=0.5+0.5*sin(length(pos)*uPsyScale*0.42-af*0.35);}

      else{b1=0.5+0.5*sin(rf*1.15+af*1.25+df+ff*1.2);b2=0.5+0.5*sin((pos.x-pos.y)*uPsyScale*0.9-af*1.1+ridge*1.2+ff);b3=0.5+0.5*sin(length(pos)*uPsyScale*0.72+af*1.6-pos.z*1.8-ff*0.7);}
      b1=qband(b1);b2=qband(b2);b3=qband(b3);
      float pd=pat*uPatternBlend*uPatternStrength;
      float pT=pow(clamp(fract(b1*0.30+b2*0.26+b3*0.20+rim*uPsyMix*0.16+lv*0.10+pd*0.55),0.0,1.0),max(0.1,uPaletteContrast));
      pT=qband(pT);
      vec3 p1=psyPal(pT),p2=psyPal(qband(fract(pT+0.22))),p3=psyPal(qband(fract(pT+0.47)));
      vec3 lp=mix(mix(p1,p2,b2*0.65),p3,b3*0.5);

      lp*=mix(0.7,1.3,lv);lp+=mix(vec3(0.0),uWarmColor,r2*0.24*uRingStrength)+uCoolColor*pow(rim,1.8)*0.35;
      lp=mix(lp,mix(uPsyColorA,uPsyColorD,pat),pd*0.75);baseCol=mix(uShadowTint,lp,clamp(lv+0.22,0.0,1.0));
    }

    baseCol=satVib(baseCol*uColorIntensity,uColorSaturation,uColorVibrance);

    if(isPsy&&uPsyShaderMode>0.5){
      vec3 psy=max(baseCol,vec3(0.0));psy*=mix(1.0,0.35+0.65*lv,clamp(uPsyDepthShade,0.0,1.0));
      psy=pow(max(psy,vec3(0.0)),vec3(1.0/max(0.001,uPsyContrast)));psy=mix(vec3(dot(psy,vec3(0.299,0.587,0.114))),psy,uPsySaturation);
      float gm=smoothstep(uPsyGlowThreshold,1.0,max(max(psy.r,psy.g),psy.b));
      vec3 em=psy*uPsyEmission+psy*gm*uPsyInternalGlow*uPsyGlowOn;
      if(uPsyShaderMode<1.5)shadedColor=em;else shadedColor=mix(em,em*mix(0.55,1.0,lv),clamp(uPsyDepthShade,0.0,1.0));
      specular=vec3(0.0);
    }else{
      if(uPreserveHighlightColor>0.5)shadedColor=baseCol*mix(vec3(0.25),uLightColor,lv);
      else shadedColor=mix(baseCol*0.35,baseCol,lv)+uLightColor*spec*0.25;
    }

    vec3 glowLayer=vec3(0.0);
    if(uGlowOn>0.5&&uGlowStrength>0.001){
      float gwe=mix(3.5,0.35,clamp(uGlowWidth/4.0,0.0,1.0)),rp=pow(rim,gwe),gaa=fwidth(rp)*1.75+0.0005;
      float gMsk=smoothstep(0.02-gaa,0.02+gaa,rp)*(1.0-smoothstep(0.65-gaa,0.65+gaa,rp));
      float gCrd=(uGlowScroll>0.5)?fract(rim+iTime*uGlowScrollSpeed*mix(1.0,-1.0,step(0.5,uGlowReverse))):rim;
      glowLayer=mix(uGlowColorA,uGlowColorB,gCrd)*gMsk*mix(uGlowAlphaA,uGlowAlphaB,gCrd)*uGlowStrength*uGlowOn*(1.0+uGlowEmission);
    }
    vec3 lineColor=vec3(0.0);float lma=0.0;
    if(uLineOn>0.5&&uLineStrength>0.001){
      float lwe=mix(7.5,1.2,clamp(uLineWidth/4.0,0.0,1.0)),lr=pow(rim,lwe),laa=fwidth(lr)*(0.5+uLineSoftness*2.0)+0.0003,lc=0.18;
      float lMsk=clamp((smoothstep(lc-laa,lc,lr)-smoothstep(lc,lc+laa,lr))*8.0,0.0,1.0);
      float lCrd=(uLineScroll>0.5)?fract(rim+iTime*uLineScrollSpeed*mix(1.0,-1.0,step(0.5,uLineReverse))):rim;
      lma=lMsk*mix(uLineAlphaA,uLineAlphaB,lCrd)*uLineStrength*uLineOn;lineColor=mix(uLineColorA,uLineColorB,lCrd);
    }

      float iMsk=smoothstep(0.0,iaa+1e-4,ip_)*(1.0-smoothstep(0.82-iaa,0.82+iaa,ip_));ig=uInnerGlowColor*iMsk*uInnerGlowStrength;

}

<script>
"use strict";

// ═══════════════════════════════════════════════════════════════════════════
//  MODULE 1 — TimelineEngine
//  The one true clock. Everything reads t from here.
// ═══════════════════════════════════════════════════════════════════════════
const TimelineEngine = (() => {
  let _startWall = null;   // performance.now()/1000 when last play() was called
  let _offset    = 0.0;   // timeline seconds at last play()
  let _rate      = 1.0;
  let _playing   = false;
  let _pausedAt  = 0.0;

  function play()  {
    if (_playing) return;
    _startWall = performance.now() / 1000;
    _offset    = _pausedAt;
    _playing   = true;
  }
  function pause() {
    if (!_playing) return;
    _pausedAt = now();
    _playing  = false;
  }
  function seekTo(t) {
    t = Math.max(0, t);
    _offset   = t;
    _pausedAt = t;
    if (_playing) _startWall = performance.now() / 1000;
  }
  function setRate(r) { _rate = r; }
  function isPlaying() { return _playing; }
  // ── The one true time getter ──────────────────────────────────────────
  function now() {
    if (!_playing) return _pausedAt;
    return _offset + (performance.now() / 1000 - _startWall) * _rate;
  }
  return { play, pause, seekTo, setRate, isPlaying, now };
})();

// ═══════════════════════════════════════════════════════════════════════════
//  MODULE 2 — SeededRandom
//  Deterministic LCG. same seed + same index → same value, always.
// ═══════════════════════════════════════════════════════════════════════════
const SeededRandom = (() => {
  const A = 1664525, C = 1013904223, M = 4294967296;
  function hash(seed, index) {
    let s = ((seed * 1000003 + index * 999983) >>> 0);
    s = ((s * A + C) >>> 0);
    s = ((s * A + C) >>> 0);
    return s / M;
  }
  function range(seed, idx, min, max) { return min + hash(seed, idx) * (max - min); }
  function pick(seed, idx, arr)        { return arr[Math.floor(hash(seed, idx) * arr.length)]; }
  return { hash, range, pick };
})();

// ═══════════════════════════════════════════════════════════════════════════
//  MODULE 3 — RenderState
//  Single source of truth for all visual parameters.
//  UI writes here. Renderer reads here. Nothing else.
// ═══════════════════════════════════════════════════════════════════════════
const RenderState = (() => {
  // ── Defaults — the complete description of one frame ──────────────────
  const DEFAULTS = {
    // fractal structure
    uPower:8.0, uBailout:1.5, uIterations:12, uSurfaceEpsilon:0.001,
    uShape:0,
    // rotation base angles (static, set by drag or GUI)
    rotBaseX:0.0, rotBaseY:0.0, rotBaseZ:0.0,
    // auto-rotation: rotation = base + t*speed (pure function of t)
    autoRotateX:false, autoRotateY:false, autoRotateZ:false,
    rotateSpeedX:0.5, rotateSpeedY:1.0, rotateSpeedZ:0.75,
    // camera
    zoomValue:2.2,
    cameraRollOn:false, cameraRollSpeed:0.25,
    breathingOn:false, breathingSpeed:0.4, breathingAmount:0.08,
    // power animation (pure function of t)
    powerAnimation:false, powerAnimationSpeed:1.0, powerMin:2.0, powerMax:100.0,
    // psy scale cycle (pure function of t)
    psyScaleCycle:false, psyScaleCycleSpeed:0.5, psyScaleCycleAmount:2.0,
    // trippy mode (pure function of t)
    trippyMode:false, trippySpeed:1.0,
    // kaleidoscope (pure function of t)
    kaleidoscopeMode:false, kaleidoscopeSpeed:1.0,
    // lighting
    lightIntensity:1.0, lightAzimuth:0.0, lightElevation:0.6, lightColor:"#ffffff",
    shadowStrength:1.0, shadowTint:"#000000", contrast:1.0, midtoneLift:0.55,
    specularStrength:0.65, specularSize:0.95,
    // color
    colorSaturation:1.2, colorVibrance:0.6, paletteContrast:1.2,
    colorIntensity:1.0, preserveHighlightColor:true,
    ridgeAccent:0.35, cavityStrength:0.2,
    // glow
    glowOn:true,
    glowColorA:"#ff8c3a", glowAlphaA:1.0, glowColorB:"#ffb65f", glowAlphaB:0.0,
    glowStrength:0.55, glowWidth:1.25, glowEmission:0.35,
    glowScroll:false, glowScrollSpeed:0.3, glowReverse:false,
    // line
    lineOn:true,
    lineColorA:"#000000", lineAlphaA:0.85, lineColorB:"#000000", lineAlphaB:0.85,
    lineStrength:0.85, lineWidth:0.65, lineSoftness:0.35,
    lineScroll:false, lineScrollSpeed:0.3, lineReverse:false,
    // inner glow
    innerGlowStrength:0.12, innerGlowWidth:1.25, innerGlowColor:"#66fff4",
    // palette
    paletteMode:2, ringScale:6.0, ringStrength:0.6,
    warmColor:"#ff8c3a", coolColor:"#2fe1d6",
    psyColorA:"#18d8d8", psyColorB:"#a6ff3c", psyColorC:"#ff9a1f", psyColorD:"#ff4d7a",
    psyMix:0.85, psyScale:8.0, psyFlow:0.7, psySpinStrength:2.3,
    paletteCycle:true, paletteCycleSpeed:0.5, psyStyle:0,
    // pattern
    patternMode:0, patternStrength:0.7, patternScale:8.0, patternSpeed:1.0, patternBlend:0.75,
    colorBands:8.0, bandStrength:1.0,
    // psy shader
    psyShaderMode:0, psyEmission:1.2, psyDepthShade:0.65,
    psyContrast:1.3, psySaturation:1.1,
    psyInternalGlow:0.2, psyGlowThreshold:0.7, psyGlowOn:true,
    // symmetry
    symmetryMode:0, radialSegments:6, symmetryStack:false,
    twistOn:false, twistAmount:1.5,
    foldOn:false, foldIterations:2,
    tileOn:false, tileAmount:2.0,
    polarOn:false, offsetOn:false, offsetAmount:0.25,
    // legacy
    mirror:false, mirrorQuad:false,
    // audio
    musicReact:true, micSensitivity:1.0, musicMatch:false,
    flySpeed:0.05,
    // seed for deterministic randomization
    seed:42
  };

  let _s = { ...DEFAULTS };

  function get(k)          { return _s[k]; }
  function set(k, v)       { _s[k] = v; }
  function getAll()        { return { ..._s }; }
  function applySnapshot(snap) { Object.assign(_s, snap); }
  function reset()         { _s = { ...DEFAULTS }; }
  function getDefaults()   { return { ...DEFAULTS }; }

  // ── computeAtTime: derive all time-varying values from t ──────────────
  // This is where ALL animation math lives.
  // No mutation — returns a new object.
  function computeAtTime(t) {
    const s = _s;
    // rotation: base + continuous function of t (never +=)
    const rotX = s.rotBaseX + (s.autoRotateX ? t * s.rotateSpeedX : 0);
    const rotY = s.rotBaseY + (s.autoRotateY ? t * s.rotateSpeedY : 0);
    const rotZ = s.rotBaseZ + (s.autoRotateZ ? t * s.rotateSpeedZ : 0);
    // camera roll: pure function of t
    const screenRotateAngle = s.cameraRollOn ? t * s.cameraRollSpeed : 0.0;
    // breathing: pure function of t
    let effectiveZoom = s.zoomValue;
    if (s.breathingOn) {
      const off = Math.sin(t * s.breathingSpeed) * s.breathingAmount;
      effectiveZoom = Math.max(1.0, Math.min(s.zoomValue * 1.5, s.zoomValue + off));
    }
    // power animation: pure function of t
    let uPower = s.uPower;
    if (s.powerAnimation) {
      const range = s.powerMax - s.powerMin;
      if (range > 0.0001) {
        const x = (t * s.powerAnimationSpeed) % (2 * range);
        uPower = s.powerMin + (x < range ? x : 2 * range - x);
      } else {
        uPower = s.powerMin;
      }
    }
    // psy scale cycle: pure function of t
    let uPsyScale = s.psyScale;
    if (s.psyScaleCycle) {
      uPsyScale = Math.max(0.1, s.psyScale + Math.sin(t * s.psyScaleCycleSpeed) * s.psyScaleCycleAmount);
    }
    // trippy: pure function of t
    let uColorHSL = null;
    if (s.trippyMode) {
      uColorHSL = (t * (s.trippySpeed / 10.0)) % 1.0;
    }
    // kaleidoscope light azimuth: pure function of t
    const lightAzimuth = s.kaleidoscopeMode
      ? (((s.lightAzimuth + t * s.kaleidoscopeSpeed) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2) - Math.PI
      : s.lightAzimuth;

    return {
      ...s,
      uFractalRotationX: rotX,
      uFractalRotationY: rotY,
      uFractalRotationZ: rotZ,
      screenRotateAngle,
      effectiveZoom,
      uPower,
      uPsyScale,
      uColorHSL,          // null = use s.uColor string; number = use HSL hue
      lightAzimuth
    };
  }

  return { get, set, getAll, applySnapshot, reset, getDefaults, computeAtTime };
})();

// ═══════════════════════════════════════════════════════════════════════════
//  MODULE 4 — SessionRecorder
//  Logs parameter changes as timestamped events. Only writes on change.
// ═══════════════════════════════════════════════════════════════════════════
const SessionRecorder = (() => {
  let _events    = [];
  let _recording = false;
  let _getTime   = () => TimelineEngine.now();

  function startRecording() {
    _events    = [];
    _recording = true;
    // Snapshot full state so playback can start from a clean slate
    _events.push({ time: _getTime(), type: "snapshot", state: RenderState.getAll() });
    updateSessionUI();
  }
  function stopRecording() {
    _recording = false;
    updateSessionUI();
  }
  function isRecording() { return _recording; }
  function getEvents()   { return _events.slice(); }

  // Call this from every UI change handler
  function recordParam(name, value) {
    if (!_recording) return;
    _events.push({ time: _getTime(), type: "param", name, value });
  }
  function recordPreset(name, values) {
    if (!_recording) return;
    _events.push({ time: _getTime(), type: "preset", name, state: { ...values } });
  }
  function exportJSON() {
    return JSON.stringify({ version: 1, durationSeconds: _getTime(), events: _events }, null, 2);
  }
  function importJSON(json) {
    const d = JSON.parse(json);
    _events = (d.events || []).slice().sort((a, b) => a.time - b.time);
    return _events;
  }
  function updateSessionUI() {
    const btn  = document.getElementById("recordSessionBtn");
    const stop = document.getElementById("stopSessionBtn");
    const exp  = document.getElementById("exportSessionBtn");
    const status = document.getElementById("sessionStatus");
    if (!btn) return;
    if (_recording) {
      btn.textContent  = "⏺ Recording…";
      btn.classList.add("active");
      stop.disabled    = false;
      exp.disabled     = true;
      status.textContent = `${_events.length} events`;
    } else {
      btn.textContent  = "⏺ Start Recording";
      btn.classList.remove("active");
      stop.disabled    = true;
      exp.disabled     = _events.length === 0;
      status.textContent = _events.length > 0
        ? `${_events.length} events recorded`
        : "Not recording";
    }
  }
  // Periodically update event count during recording
  setInterval(() => { if (_recording) updateSessionUI(); }, 500);

  return { startRecording, stopRecording, isRecording, getEvents, recordParam, recordPreset, exportJSON, importJSON };
})();

// ═══════════════════════════════════════════════════════════════════════════
//  MODULE 5 — SessionPlayer
//  Reconstructs RenderState at any time t by replaying the event log.
// ═══════════════════════════════════════════════════════════════════════════
const SessionPlayer = (() => {
  let _events = [];
  let _active = false;
  let _cursor = 0;   // for live forward-only playback

  function loadEvents(events) {
    _events = events.slice().sort((a, b) => a.time - b.time);
    _cursor = 0;
    _active = events.length > 0;
  }
  function isActive() { return _active; }
  function deactivate() { _active = false; }

  // Full seek: reconstruct state from scratch up to time t
  // Use this for export and scrubbing
  function applyUpToTime(t) {
    RenderState.reset();
    for (const ev of _events) {
      if (ev.time > t) break;
      _applyEvent(ev);
    }
  }

  // Live forward-only: apply only newly-due events each frame
  // More efficient for real-time playback (no reset each frame)
  function tickForward(t) {
    while (_cursor < _events.length && _events[_cursor].time <= t) {
      _applyEvent(_events[_cursor++]);
    }
  }

  function resetCursor() { _cursor = 0; }

  function _applyEvent(ev) {
    if (ev.type === "snapshot") RenderState.applySnapshot(ev.state);
    if (ev.type === "param")    RenderState.set(ev.name, ev.value);
    if (ev.type === "preset")   RenderState.applySnapshot(ev.state);
  }

  return { loadEvents, isActive, deactivate, applyUpToTime, tickForward, resetCursor };
})();

// ═══════════════════════════════════════════════════════════════════════════
//  ENGINE GLOBALS
// ═══════════════════════════════════════════════════════════════════════════
let navCamera, orthoCamera, scene, renderer, material, quad;
let gui;
let micEnabled = false;
let lastBeatTime = 0, bpm = 120;
let keys = {};
let isDragging = false, prevMouse = { x:0, y:0 };
let isPinching = false, lastPinchDist = 0;
let isBusyExport = false;

const PRESET_STORAGE_KEY  = "fractalExplorerPresetsV2";
const FIXED_PREVIEW_ASPECT= 16/9;
const FIXED_MAX_STEPS     = 50;
const FIXED_MAX_DISTANCE  = 50.0;
const MIN_ZOOM            = 1.0;
const MAX_ZOOM            = 6.0;

// Reusable vectors
const _fwd = new THREE.Vector3();
const _rgt = new THREE.Vector3();
const _up  = new THREE.Vector3();
const _rollQ = new THREE.Quaternion();
const _rollAxis = new THREE.Vector3(0,0,1);

// Audio
const audioCtx    = new (window.AudioContext || window.webkitAudioContext)();
const analyser    = audioCtx.createAnalyser();
analyser.fftSize  = 256;
const bufferLength= analyser.frequencyBinCount;
const dataArray   = new Uint8Array(bufferLength);

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if (isMobile) { RenderState.set("zoomValue", 3.8); }

// GUI controller refs for .listen() / .updateDisplay()
let rotXCtrl, rotYCtrl, rotZCtrl, lightAzCtrl, lightElCtrl;

// ── params object: thin proxy into RenderState for dat.GUI ───────────────
// dat.GUI needs a plain object. We keep params in sync with RenderState.
// UI reads from params → SessionRecorder.recordParam → RenderState.set
const params = new Proxy(RenderState.getAll(), {
  set(target, key, value) {
    target[key] = value;
    RenderState.set(key, value);
    SessionRecorder.recordParam(key, value);
    return true;
  }
});

// One-time sync: copy all defaults into proxy target
Object.assign(params, RenderState.getAll());

// ═══════════════════════════════════════════════════════════════════════════
//  MODULE 6 — FrameRenderer
//  renderFrameAtTime(t) is the single render function.
//  It is a pure function of t — same t → same frame.
// ═══════════════════════════════════════════════════════════════════════════
function renderFrameAtTime(t) {
  // 1. Get time-derived state — all sin/cos motion computed here
  const s = RenderState.computeAtTime(t);

  // 2. Audio
  let audioAvg = 0;
  if (s.musicReact && micEnabled) {
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
    audioAvg = (sum / bufferLength / 255.0) * s.micSensitivity;
  }

  // 3. Camera position — pure function of s
  navCamera.position.set(0, 0, s.effectiveZoom);

  // Camera roll quaternion
  if (s.cameraRollOn) {
    _rollQ.setFromAxisAngle(_rollAxis, s.screenRotateAngle);
    navCamera.quaternion.copy(_rollQ);
  } else {
    navCamera.quaternion.set(0, 0, 0, 1);
  }

  // 4. Camera vectors
  _fwd.set(0,0,-1).applyQuaternion(navCamera.quaternion).normalize();
  _rgt.set(1,0, 0).applyQuaternion(navCamera.quaternion).normalize();
  _up .set(0,1, 0).applyQuaternion(navCamera.quaternion).normalize();

  // 5. Push all uniforms
  const u = material.uniforms;
  u.iTime.value = t;
  u.uMusic.value = audioAvg;

  // Color (trippy is a pure function of t)
  if (s.uColorHSL !== null) {
    u.uColor.value.setHSL(s.uColorHSL, 0.7, 0.5);
  } else {
    u.uColor.value.set(s.uColor || "#FFD700");
  }

  u.uFractalRotation.value.set(s.uFractalRotationX, s.uFractalRotationY, s.uFractalRotationZ);
  u.uScreenRotateAngle.value = s.screenRotateAngle;
  u.uPower.value             = s.uPower;
  u.uBailout.value           = s.uBailout;
  u.uIterations.value        = s.uIterations;
  u.uSurfaceEpsilon.value    = s.uSurfaceEpsilon;
  u.uMaxSteps.value          = FIXED_MAX_STEPS;
  u.uMaxDistance.value       = FIXED_MAX_DISTANCE;
  u.uShape.value             = s.uShape;
  u.uMirror.value            = s.mirror    ? 1:0;
  u.uMirrorQuad.value        = s.mirrorQuad? 1:0;

  u.uLightIntensity.value  = s.lightIntensity;
  u.uLightAzimuth.value    = s.lightAzimuth;
  u.uLightElevation.value  = s.lightElevation;
  u.uLightColor.value.set(s.lightColor);
  u.uShadowStrength.value  = s.shadowStrength;
  u.uShadowTint.value.set(s.shadowTint);
  u.uContrast.value        = s.contrast;
  u.uMidtoneLift.value     = s.midtoneLift;

// ═══════════════════════════════════════════════════════════════════════════
//  MODULE 7 — ExportEngine
//  Offline frame-by-frame render loop.
//  Fully deterministic: same session + same params → identical output.
// ═══════════════════════════════════════════════════════════════════════════
const ExportEngine = (() => {
  let _busy = false;

  function isBusy() { return _busy; }

  function _setRes(w, h) {
    renderer.setPixelRatio(1);
    renderer.setSize(w, h, false);
    material.uniforms.iResolution.value.set(w, h);
  }

  function _waitFrame() { return new Promise(r => requestAnimationFrame(r)); }

  async function exportStill(width, height) {
    if (_busy) return;
    _busy = true;
    const t = TimelineEngine.now();
    _setRes(width, height);
    renderFrameAtTime(t);
    await _waitFrame();
    renderer.domElement.toBlob(blob => {
      if (!blob) { alert("Export failed."); }
      else {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `fractal-${width}x${height}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
      }
      _busy = false;
      resizeRendererToPreviewFrame();
    }, "image/png");
  }

  // Offline video export: renders each frame deterministically at frame/fps.
  // If a session is loaded, it replays events for each frame.
  async function exportVideo({ durationMs, videoBitsPerSecond, mimeType, width, height }) {
    if (_busy) return;
    _busy = true;

    const startT     = TimelineEngine.now();
    const fps        = 60;
    const totalFrames= Math.max(1, Math.round((durationMs / 1000) * fps));

    _setRes(width, height);

    const stream   = renderer.domElement.captureStream(fps);
    let   recorder;
    try {
      recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond });
    } catch (e) {
      alert("Recording failed to start.");
      _busy = false;
      resizeRendererToPreviewFrame();
      return;
    }

    const chunks = [];
    const ext    = mimeType.includes("mp4") ? "mp4" : "webm";
    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };

    const stopPromise = new Promise(resolve => { recorder.onstop = resolve; });
    recorder.start();

    const recordBtn = document.getElementById("recordBtn");
    if (recordBtn) { recordBtn.disabled = true; recordBtn.textContent = "Recording…"; }

    // ── deterministic frame loop ─────────────────────────────────────────
    // Each frame: seek session to t, compute state, render.
    // Same session + same startT → identical video every time.
    const hasSession = SessionPlayer.isActive();
    if (hasSession) {
      // Save current state so we can restore it after export
      const savedState = RenderState.getAll();
      for (let f = 0; f < totalFrames; f++) {
        const t = startT + f / fps;
        SessionPlayer.applyUpToTime(t);  // reconstruct state at this t
        renderFrameAtTime(t);
        await _waitFrame();
      }
      RenderState.applySnapshot(savedState);
    } else {
      // No session — just render current params at each t
      for (let f = 0; f < totalFrames; f++) {
        const t = startT + f / fps;
        renderFrameAtTime(t);
        await _waitFrame();
      }
    }

    recorder.stop();
    await stopPromise;

    const blob = new Blob(chunks, { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `fractal-clip-${width}x${height}.${ext}`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);

    _busy = false;
    resizeRendererToPreviewFrame();
    if (recordBtn) { recordBtn.disabled = false; recordBtn.textContent = "Record Clip"; }
  }

  return { isBusy, exportStill, exportVideo };
})();

//  PRESET SYSTEM

function loadPresetsFromStorage() {
  try { const r = localStorage.getItem(PRESET_STORAGE_KEY); return r ? JSON.parse(r)||{} : {}; }
  catch(e) { return {}; }
}
function savePresetsToStorage(p) { localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(p)); }

function refreshPresetSelect() {
  const sel    = document.getElementById("presetSelect");
  const presets= loadPresetsFromStorage();
  const names  = Object.keys(presets).sort((a,b) => a.localeCompare(b));
  sel.innerHTML = "";
  if (!names.length) {
    const o = document.createElement("option"); o.value=""; o.textContent="No saved presets";
    sel.appendChild(o); return;
  }
  names.forEach(n => {
    const o = document.createElement("option"); o.value = o.textContent = n; sel.appendChild(o);
  });
}

function applyPresetData(data, name) {
  // Write into RenderState directly (not through params proxy) to avoid flooding recorder
  RenderState.applySnapshot(data);
  // Sync proxy target
  Object.assign(params, RenderState.getAll());
  // Record as a single preset event
  SessionRecorder.recordPreset(name || "preset", data);
  refreshGuiDisplays();
}

function refreshGuiDisplays() {
  // Sync proxy target from RenderState
  Object.assign(params, RenderState.getAll());
  const upd = f => {
    if (!f) return;
    if (f.__controllers) f.__controllers.forEach(c => c.updateDisplay());
    if (f.__folders)     Object.values(f.__folders).forEach(upd);
  };
  upd(gui);
  if (rotXCtrl)   rotXCtrl.updateDisplay();
  if (rotYCtrl)   rotYCtrl.updateDisplay();
  if (rotZCtrl)   rotZCtrl.updateDisplay();
  if (lightAzCtrl) lightAzCtrl.updateDisplay();
  if (lightElCtrl) lightElCtrl.updateDisplay();
}

    const p = loadPresetsFromStorage(); let fn = base, i = 2; while (p[fn]) fn = `${base} ${i++}`;
    p[fn] = { name:fn, savedAt:new Date().toISOString(), values:obj.values };
    savePresetsToStorage(p); refreshPresetSelect();
    document.getElementById("presetSelect").value = fn;
    document.getElementById("presetNameInput").value = fn;
  } catch(err) { alert("Could not import preset JSON."); }
  e.target.value = "";
});

// Seeded randomization — reproducible from seed
document.getElementById("randomizeBtn").addEventListener("click", () => {
  const seed = Math.floor(Math.random() * 9999999);
  const SR   = SeededRandom;

  const COLORS = ["#18d8d8","#a6ff3c","#ff9a1f","#ff4d7a","#3c8aff","#ff3cf0","#f0ff3c","#3cffa0","#ff6e3c","#c03cff"];
  const snap = {
    seed,
    uPower:          SR.range(seed, 0, 2, 16),
    uBailout:        SR.range(seed, 1, 1.5, 3.0),
    uIterations:     Math.round(SR.range(seed, 2, 6, 16)),
    uShape:          Math.floor(SR.range(seed, 3, 0, 4)),
    paletteMode:     Math.floor(SR.range(seed, 4, 0, 3)),
    psyStyle:        Math.floor(SR.range(seed, 5, 0, 3)),
    psyScale:        SR.range(seed, 6, 2, 18),
    psyFlow:         SR.range(seed, 7, 0, 3),
    psySpinStrength: SR.range(seed, 8, 0, 5),
    symmetryMode:    Math.floor(SR.range(seed, 9, 0, 10)),
    autoRotateY:     SR.hash(seed, 10) > 0.3,
    rotateSpeedY:    SR.range(seed, 11, -1.5, 1.5),
    paletteCycleSpeed: SR.range(seed, 12, 0.1, 2.0),
    psyColorA:       SR.pick(seed, 13, COLORS),
    psyColorB:       SR.pick(seed, 14, COLORS),
    psyColorC:       SR.pick(seed, 15, COLORS),
    psyColorD:       SR.pick(seed, 16, COLORS),
    glowStrength:    SR.range(seed, 17, 0.2, 1.5),
    breathingOn:     SR.hash(seed, 18) > 0.5,
    breathingAmount: SR.range(seed, 19, 0.02, 0.15),
    psyShaderMode:   Math.floor(SR.range(seed, 20, 0, 3)),
    psyEmission:     SR.range(seed, 21, 0.5, 2.5),
  };
  RenderState.applySnapshot(snap);
  Object.assign(params, RenderState.getAll());
  SessionRecorder.recordPreset(`random-${seed}`, snap);
  refreshGuiDisplays();
});

function parseExportDimensions() {
  const [w,h] = document.getElementById("exportFormatSelect").value.split("x").map(Number);
  return {width:w, height:h};
}
function getBitrate(q) { return {low:5e6,medium:12e6,high:25e6,ultra:50e6}[q]||25e6; }
function getMime(f) {
  const s = t => MediaRecorder.isTypeSupported(t) ? t : null;
  if (f==="webm-vp9") return s("video/webm;codecs=vp9")||s("video/webm")||"";
  if (f==="webm")     return s("video/webm")||"";
  if (f==="mp4")      return s("video/mp4;codecs=avc1")||s("video/mp4")||"";
  return s("video/webm;codecs=vp9")||s("video/webm")||"";
}

function layoutPreviewFrame() {
  const c = document.getElementById("canvasContainer");
  const f = document.getElementById("previewFrame");
  const cw = Math.max(1, c.clientWidth), ch = Math.max(1, c.clientHeight);
  let fw, fh;
  if (cw/ch > FIXED_PREVIEW_ASPECT) { fh=ch; fw=fh*FIXED_PREVIEW_ASPECT; }
  else { fw=cw; fh=fw/FIXED_PREVIEW_ASPECT; }
  f.style.width  = `${fw}px`; f.style.height = `${fh}px`;
  f.style.left   = `${(cw-fw)*0.5}px`; f.style.top = `${(ch-fh)*0.5}px`;
}

function resizeRendererToPreviewFrame() {
  if (!renderer || !material) return;
  const f  = document.getElementById("previewFrame");
  const w  = Math.max(1, f.clientWidth), h = Math.max(1, f.clientHeight);
  const pr = Math.min(window.devicePixelRatio || 1, 2);
  renderer.setPixelRatio(pr); renderer.setSize(w, h, false);
  material.uniforms.iResolution.value.set(w*pr, h*pr);
}

// ═══════════════════════════════════════════════════════════════════════════
//  INPUT — mouse/touch/keyboard
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener("keydown", e => { keys[e.key] = true; });
window.addEventListener("keyup",   e => { keys[e.key] = false; });

function onMouseDown(e) { isDragging=true; prevMouse.x=e.clientX; prevMouse.y=e.clientY; }
function onMouseUp()    { isDragging=false; }
function onMouseMove(e) {
  if (!isDragging) return;
  // Manual drag updates base rotation angles in RenderState
  RenderState.set("rotBaseX", RenderState.get("rotBaseX") + (e.clientY - prevMouse.y) * 0.005);
  RenderState.set("rotBaseY", RenderState.get("rotBaseY") + (e.clientX - prevMouse.x) * 0.005);
  SessionRecorder.recordParam("rotBaseX", RenderState.get("rotBaseX"));
  SessionRecorder.recordParam("rotBaseY", RenderState.get("rotBaseY"));
  Object.assign(params, RenderState.getAll());
  if (rotXCtrl) rotXCtrl.updateDisplay();
  if (rotYCtrl) rotYCtrl.updateDisplay();
  prevMouse.x = e.clientX; prevMouse.y = e.clientY;
}

function onTouchStart(e) {
  if (e.touches.length===1) { isDragging=true; prevMouse.x=e.touches[0].clientX; prevMouse.y=e.touches[0].clientY; }
  else if (e.touches.length===2) { isPinching=true; lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
}
function onTouchMove(e) {
  if (isPinching && e.touches.length===2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const z = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, RenderState.get("zoomValue") + (d-lastPinchDist)*0.005));
    RenderState.set("zoomValue", z); params.zoomValue = z;
    lastPinchDist = d;
  } else if (isDragging && e.touches.length===1) {
    RenderState.set("rotBaseY", RenderState.get("rotBaseY") + (e.touches[0].clientX-prevMouse.x)*0.005);
    RenderState.set("rotBaseX", RenderState.get("rotBaseX") + (e.touches[0].clientY-prevMouse.y)*0.005);
    Object.assign(params, RenderState.getAll());
    prevMouse.x=e.touches[0].clientX; prevMouse.y=e.touches[0].clientY;
  }
  e.preventDefault();
}
function onTouchEnd(e) { if (e.touches.length<2) isPinching=false; if (e.touches.length===0) isDragging=false; }

  try { await enableMicrophone(); document.getElementById("startStatus").textContent=""; closeStartOverlay(); }
  catch (err) { micEnabled=false; document.getElementById("startStatus").textContent="Microphone access failed. You can start without microphone."; document.getElementById("enterWithMicBtn").disabled=document.getElementById("enterWithoutMicBtn").disabled=false; }
});

document.getElementById("enterWithoutMicBtn").addEventListener("click", async e => {
  e.preventDefault(); e.stopPropagation();
  try { if (audioCtx.state==="suspended") await audioCtx.resume(); } catch(e2) {}
  micEnabled=false; closeStartOverlay();
});

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN ANIMATE LOOP
//  Thin. Just reads t from TimelineEngine and calls renderFrameAtTime(t).
//  No state mutation here — all mutation lives in modules above.
// ═══════════════════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);

  if (ExportEngine.isBusy()) return; // export owns the renderer during export

  const t = TimelineEngine.now();

  // If a session is being played back, advance its event cursor
  if (SessionPlayer.isActive()) {
    SessionPlayer.tickForward(t);
    // Sync proxy so GUI shows the replayed values
    Object.assign(params, RenderState.getAll());
  }

  // Keyboard fly — this is the one place where state mutation from input happens
  // It writes to RenderState (zoomValue) which then flows to effectiveZoom in computeAtTime
  if (!isBusyExport) {
    const s = RenderState.getAll();
    let moved = false;
    if (keys["ArrowUp"]   || keys["w"]) { navCamera.translateZ(-s.flySpeed); moved=true; }
    if (keys["ArrowDown"] || keys["s"]) { navCamera.translateZ( s.flySpeed); moved=true; }
    if (keys["ArrowLeft"] || keys["a"]) { navCamera.translateX(-s.flySpeed); moved=true; }
    if (keys["ArrowRight"]|| keys["d"]) { navCamera.translateX( s.flySpeed); moved=true; }
    if (keys["q"]) { navCamera.translateY( s.flySpeed); moved=true; }
    if (keys["e"]) { navCamera.translateY(-s.flySpeed); moved=true; }
    if (moved && !s.breathingOn) {
      const z = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, navCamera.position.z));
      RenderState.set("zoomValue", z);
      params.zoomValue = z;
    }
  }

  renderFrameAtTime(t);
}
